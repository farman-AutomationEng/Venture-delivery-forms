<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Venture Delivery Reports</title>
<style>
/* ═══════════════════════════════════════════
   GEOTAB ZENITH THEME — Venture Delivery Reports
   #00263E navy · #0078D4 blue · #00B5CC teal
   ═══════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow-x:hidden}
body{font-family:'Segoe UI','Inter',Arial,sans-serif;background:#F2F5F7;min-height:100vh;color:#1A2432;font-size:13px}

/* ── Header ─────────────────────────────── */
.hdr{background:#00263E;padding:0 18px;height:52px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.25)}
.hdr h1{color:#FFFFFF;font-size:13px;font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.hdr p{color:#7BBFDB;font-size:9px;letter-spacing:1.5px;margin-top:2px;text-transform:uppercase}
.geo-dot{width:7px;height:7px;border-radius:50%;background:#6B7280;display:inline-block;margin-right:5px;vertical-align:middle}
.geo-dot.ok{background:#00C781}
.geo-dot.loading{background:#F59E0B;animation:pulse .8s ease-in-out infinite alternate}
@keyframes pulse{from{opacity:.4}to{opacity:1}}

/* ── KPI bar ─────────────────────────────── */
.kpis{display:flex;gap:10px;padding:12px 18px;flex-wrap:wrap;background:#00263E;border-bottom:1px solid rgba(255,255,255,.08)}
.kpi{flex:1;min-width:90px;background:rgba(255,255,255,.07);border-radius:4px;padding:10px 14px;border-top:3px solid #0078D4}
.kpi.g{border-top-color:#00C781}.kpi.r{border-top-color:#DE350B}.kpi.y{border-top-color:#F59E0B}
.kv{font-size:20px;font-weight:800;color:#FFFFFF;line-height:1}
.kl{font-size:9px;color:#7BBFDB;margin-top:3px;font-weight:600;text-transform:uppercase;letter-spacing:.6px}

/* ── Filters ─────────────────────────────── */
.filters{background:white;padding:10px 18px;display:flex;flex-wrap:wrap;gap:8px;align-items:flex-end;border-bottom:1px solid #E5E7EB}
.ff{display:flex;flex-direction:column;gap:3px}
.ff label{font-size:9px;font-weight:600;color:#6B7280;text-transform:uppercase;letter-spacing:.7px}
.ff input,.ff select{padding:6px 9px;border:1px solid #D1D5DB;border-radius:4px;font-size:12px;font-family:'Segoe UI',Arial,sans-serif;color:#1A2432;background:white;outline:none;-webkit-appearance:none;transition:border-color .15s}
.ff input:focus,.ff select:focus{border-color:#0078D4;box-shadow:0 0 0 3px rgba(0,120,212,.1)}

/* ── Buttons ─────────────────────────────── */
.btn{padding:7px 13px;border:none;border-radius:4px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:'Segoe UI',Arial,sans-serif;transition:all .15s}
.bp{background:#0078D4;color:white}.bp:hover{background:#006BBD}
.bg2{background:white;color:#374151;border:1px solid #D1D5DB}.bg2:hover{background:#F9FAFB}
.bn{background:#00875A;color:white}.bn:hover{background:#006B47}

/* ── Table wrapper ───────────────────────── */
.tbl-wrap{background:white;margin:14px 18px;border-radius:4px;border:1px solid #E5E7EB;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.tbl-head{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid #E5E7EB;flex-wrap:wrap;gap:5px;background:#FAFAFA}
.tbl-head h2{font-size:12px;font-weight:700;color:#00263E;text-transform:uppercase;letter-spacing:.5px}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:650px}
thead tr{background:#00263E}
thead th{padding:9px 10px;text-align:left;color:white;font-size:10px;font-weight:600;white-space:nowrap;cursor:pointer;user-select:none;text-transform:uppercase;letter-spacing:.5px}
thead th:hover{background:#003554}
tbody tr{border-bottom:1px solid #F3F4F6;cursor:pointer;transition:background .1s}
tbody tr:hover{background:#F0F7FF}
tbody tr.dmg{background:#FFF7ED}
tbody td{padding:8px 10px;vertical-align:middle}

/* ── Badges ──────────────────────────────── */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.2px}
.bg-green{background:#D1FAE5;color:#065F46}.bg-blue{background:#DBEAFE;color:#1E40AF}
.bg-red{background:#FEE2E2;color:#991B1B}.bg-yellow{background:#FEF9C3;color:#92400E}.bg-gray{background:#F3F4F6;color:#374151}

.drv-name{font-weight:600;font-size:12px;color:#1A2432}
.drv-grp{font-size:10px;color:#0078D4;font-weight:500;margin-top:1px}

/* ── Empty / Loading ─────────────────────── */
.empty{display:flex;flex-direction:column;align-items:center;padding:40px 16px;color:#9CA3AF}
.sp{border:3px solid #E5E7EB;border-top:3px solid #0078D4;border-radius:50%;width:26px;height:26px;animation:spin .7s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Detail panel ────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:none}
.panel{position:fixed;right:0;top:0;bottom:0;width:370px;max-width:95vw;background:white;box-shadow:-4px 0 24px rgba(0,0,0,.12);overflow-y:auto;z-index:201;display:none;animation:slidein .2s}
@keyframes slidein{from{transform:translateX(100%)}to{transform:translateX(0)}}
.ph{background:#00263E;padding:14px 16px;position:sticky;top:0;z-index:10}
.ph h3{color:white;font-size:13px;font-weight:700}.ph p{color:#7BBFDB;font-size:10px;margin-top:2px}
.pcl{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.15);border:none;color:white;font-size:15px;cursor:pointer;border-radius:3px;width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.pb{padding:14px}
.psec{margin-bottom:14px}
.psec h4{font-size:9px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.9px;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid #E5E7EB}
.pr{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #F9FAFB}
.pr .l{color:#6B7280;font-size:11px}.pr .v{font-weight:600;font-size:11px;color:#1A2432;text-align:right;max-width:200px;word-break:break-word}
.dcard{background:#EBF5FB;border-radius:4px;padding:10px 12px;margin-bottom:12px;border:1px solid #BFDBFE}

/* ── Pagination ──────────────────────────── */
.pag{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#FAFAFA;border-top:1px solid #E5E7EB;font-size:11px;color:#6B7280;flex-wrap:wrap;gap:5px}
.pbtns{display:flex;gap:3px}
.pb2{padding:4px 9px;border:1px solid #E5E7EB;border-radius:3px;background:white;font-size:11px;cursor:pointer;font-weight:600;color:#374151;transition:all .15s}
.pb2.active{background:#0078D4;border-color:#0078D4;color:white}
.pb2:disabled{opacity:.4;cursor:not-allowed}

/* ── Error ───────────────────────────────── */
.err-box{background:#FEF2F2;border:1px solid #FECACA;border-radius:4px;padding:12px 14px;margin:10px 18px;font-size:12px;color:#991B1B;display:none}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>Venture Delivery Reports</h1>
    <p id="geo-txt"><span class="geo-dot loading"></span>Connecting...</p>
  </div>
  <span style="background:rgba(255,255,255,.15);color:white;font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px" id="dbadge"></span>
</div>

<div class="kpis">
  <div class="kpi"><div class="kv" id="k1">—</div><div class="kl">Total Deliveries</div></div>
  <div class="kpi g"><div class="kv" id="k2">—</div><div class="kl">Total COD</div></div>
  <div class="kpi r"><div class="kv" id="k3">—</div><div class="kl">Damages</div></div>
  <div class="kpi y"><div class="kv" id="k4">—</div><div class="kl">Drivers</div></div>
</div>

<div class="err-box" id="errbox"></div>

<div class="filters">
  <div class="ff"><label>From</label><input type="date" id="f-from"></div>
  <div class="ff"><label>To</label><input type="date" id="f-to"></div>
  <div class="ff"><label>Group</label>
    <select id="f-grp" onchange="onGrpChange()">
      <option value="all">All Groups</option>
    </select>
  </div>
  <div class="ff"><label>Driver</label>
    <select id="f-drv"><option value="all">All Drivers</option></select>
  </div>
  <div class="ff"><label>Type</label>
    <select id="f-type">
      <option value="all">All Types</option>
      <option value="delivery_sheet">📋 Delivery</option>
      <option value="invoice">🧾 Invoice</option>
      <option value="loose_parts">🔩 Parts</option>
    </select>
  </div>
  <div class="ff"><label>Status</label>
    <select id="f-sta">
      <option value="all">All Status</option>
      <option value="Submitted">Submitted</option>
      <option value="Signed">Signed</option>
    </select>
  </div>
  <div class="ff"><label>Invoice #</label><input id="f-inv" placeholder="132993" style="width:85px"></div>
  <div style="display:flex;gap:5px;align-items:flex-end">
    <button class="btn bp" onclick="loadData()">🔍 Search</button>
    <button class="btn bg2" onclick="resetF()">↺</button>
    <button class="btn bn" onclick="exportCSV()">⬇ CSV</button>
  </div>
</div>

<div class="tbl-wrap">
  <div class="tbl-head">
    <h2>Delivery Records <span id="rcnt" style="font-weight:400;color:#64748b"></span></h2>
    <button class="btn bg2" style="font-size:11px" onclick="loadData()">↺ Refresh</button>
  </div>
  <div class="tbl-scroll">
    <table>
      <thead><tr>
        <th onclick="srt('date')">Date ↕</th>
        <th onclick="srt('invoiceNo')">Invoice # ↕</th>
        <th>Type</th>
        <th onclick="srt('driverName')">Driver ↕</th>
        <th onclick="srt('dealer')">Dealer ↕</th>
        <th onclick="srt('codAmount')">COD ↕</th>
        <th>Issues</th>
        <th onclick="srt('status')">Status ↕</th>
      </tr></thead>
      <tbody id="tbody">
        <tr><td colspan="8"><div class="empty"><div class="sp"></div><div>Loading...</div></div></td></tr>
      </tbody>
    </table>
  </div>
  <div class="pag">
    <span id="pinfo"></span>
    <div class="pbtns" id="pbtns"></div>
  </div>
</div>

<div class="overlay" id="ov" onclick="closeP()"></div>
<div class="panel" id="panel">
  <div class="ph">
    <h3 id="ptitle">Detail</h3><p id="psub"></p>
    <button class="pcl" onclick="closeP()">✕</button>
  </div>
  <div class="pb" id="pbody"></div>
</div>

<script>
// ============================================================
// VENTURE DELIVERY REPORTS — ReportsPage.html
// Architecture: geotab.addin lifecycle → api.call(AddInData)
// MyGeotab injects api via initialize/focus — NOT a global var
// ============================================================

let ALL=[], FILT=[], DRIVERS=[], SK="date", SD=-1, PG=1;
let _api = null; // stored from lifecycle methods
const PP=25;
const ADDIN_ID = "azXOKPvAnSnyIdUK2xZutWA";

// ── Geotab Add-In Entry Point (REQUIRED) ──────────────────────
// MyGeotab calls initialize() then focus() — passing api object
// This is the ONLY correct way to receive api in an external URL add-in
geotab.addin.ventureReports = function() {
  return {
    initialize: function(api, state, callback) {
      _api = api;
      setGeo("ok", "dynasty_communications");
      // Load groups & drivers in background
      api.call("Get", {typeName:"Group"}, function(gs) {
        const sel = document.getElementById("f-grp");
        const valid = (gs||[]).filter(g => g.id && !["GroupCompanyId","GroupEverythingId","GroupNothingId"].includes(g.id) && !g.id.startsWith("Group"));
        valid.sort((a,b) => (a.name||"").localeCompare(b.name||"")).forEach(g => {
          sel.innerHTML += `<option value="${g.id}">${g.name||g.id}</option>`;
        });
      }, function(){});
      api.call("Get", {typeName:"User", search:{isActive:true}}, function(us) {
        DRIVERS = (us||[]).filter(u => !u.isSystemUser);
        popDrv("all");
      }, function(){});
      callback();
    },
    focus: function(api, state) {
      _api = api;
      loadData();
    },
    blur: function(api, state) {}
  };
};

// ── Dev mode fallback (when opened outside MyGeotab) ─────────
// geotab global won't exist outside MyGeotab — show empty state
if (typeof geotab === "undefined") {
  window._devMode = true;
}

function setGeo(s,t){
  document.getElementById("geo-txt").innerHTML=`<span style="width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;background:${s==='ok'?'#22c55e':s==='loading'?'#f59e0b':'#94a3b8'}"></span>${t}`;
}

function onGrpChange(){
  popDrv(document.getElementById("f-grp").value);
}
function popDrv(gid){
  const sel=document.getElementById("f-drv");
  sel.innerHTML='<option value="all">All Drivers</option>';
  let drv=gid==="all"?DRIVERS:DRIVERS.filter(u=>(u.companyGroups||[]).some(g=>g.id===gid));
  drv.sort((a,b)=>((a.firstName||"")+" "+(a.lastName||"")).localeCompare((b.firstName||"")+" "+(b.lastName||""))).forEach(u=>{
    const nm=((u.firstName||"")+" "+(u.lastName||"")).trim()||u.name||u.id;
    sel.innerHTML+=`<option value="${u.id}">${nm}</option>`;
  });
}

// ── Load Data via api.call(AddInData) — NO fetch, NO CORS ─────
function loadData(){
  showLoad();
  hideErr();
  const f=getF();

  if(!_api){
    // No api — dev mode or not yet initialized
    if(window._devMode){
      setGeo("ok","Dev Mode");
      ALL=[];
      applyLocal();
    } else {
      setGeo("loading","Waiting for MyGeotab...");
    }
    return;
  }

  // ✅ CORRECT: api.call to AddInData — runs on MyGeotab's domain, no CSP issues
  _api.call("Get",
    { typeName:"AddInData", search:{ addInId: ADDIN_ID } },
    function(rows){
      let parsed = (rows||[]).map(r => {
        try { return typeof r.details==="string" ? JSON.parse(r.details) : r.details; }
        catch(e){ return null; }
      }).filter(Boolean);
      // Client-side filters
      if(f.fromDate) parsed=parsed.filter(r=>r.date&&r.date>=f.fromDate);
      if(f.toDate)   parsed=parsed.filter(r=>r.date&&r.date<=f.toDate);
      if(f.driverId&&f.driverId!=="all") parsed=parsed.filter(r=>r.driverId===f.driverId||r.driver===f.driverId);
      if(f.formType&&f.formType!=="all") parsed=parsed.filter(r=>r.formType===f.formType);
      if(f.status&&f.status!=="all")     parsed=parsed.filter(r=>r.status===f.status);
      ALL=parsed;
      applyLocal();
    },
    function(err){
      console.error("AddInData Get error:", err);
      showErr("Error loading data: " + (err.message||err));
    }
  );
}

function getF(){
  return{
    fromDate: document.getElementById("f-from")?.value||"",
    toDate:   document.getElementById("f-to")?.value||"",
    groupId:  document.getElementById("f-grp")?.value||"all",
    driverId: document.getElementById("f-drv")?.value||"all",
    formType: document.getElementById("f-type")?.value||"all",
    status:   document.getElementById("f-sta")?.value||"all",
  };
}

function applyLocal(){
  const q=(document.getElementById("f-inv")?.value||"").trim().toLowerCase();
  FILT=ALL.filter(r=>!q||(r.invoiceNo||"").toLowerCase().includes(q));
  sortR(); updateKPI(); PG=1; renderT();
}

function resetF(){
  const td=new Date().toISOString().split("T")[0];
  const fm=new Date(); fm.setDate(1);
  document.getElementById("f-from").value=fm.toISOString().split("T")[0];
  document.getElementById("f-to").value=td;
  ["f-grp","f-drv","f-type","f-sta"].forEach(id=>document.getElementById(id).value="all");
  document.getElementById("f-inv").value="";
  popDrv("all");
  loadData();
}

function srt(k){if(SK===k)SD*=-1;else{SK=k;SD=-1;}sortR();PG=1;renderT();}
function sortR(){FILT.sort((a,b)=>{const av=a[SK]||"",bv=b[SK]||"";return typeof av==="number"?(av-bv)*SD:av.toString().localeCompare(bv.toString())*SD;});}

function updateKPI(){
  const cod=FILT.reduce((s,r)=>s+(parseFloat(r.codAmount)||0),0);
  const dmg=FILT.filter(r=>r.damaged).length;
  const drvs=new Set(FILT.map(r=>r.driverUserId).filter(Boolean)).size;
  document.getElementById("k1").textContent=FILT.length;
  document.getElementById("k2").textContent="$"+cod.toLocaleString("en-US",{maximumFractionDigits:0});
  document.getElementById("k3").textContent=dmg;
  document.getElementById("k4").textContent=drvs||"—";
}

function renderT(){
  const tb=document.getElementById("tbody");
  document.getElementById("rcnt").textContent="("+FILT.length+")";
  if(!FILT.length){
    tb.innerHTML=`<tr><td colspan="8"><div class="empty"><div style="font-size:26px;margin-bottom:8px">📭</div><div style="font-weight:700">No deliveries found</div></div></td></tr>`;
    renderPag(); return;
  }
  const sl=FILT.slice((PG-1)*PP,PG*PP);
  tb.innerHTML=sl.map(r=>{
    const dm=r.damaged||r.shortShipped;
    const iss=[r.damaged&&"⚠️ Dmg",r.shortShipped&&"📦 Short"].filter(Boolean).join(" ");
    const tb2={delivery_sheet:'<span class="badge bg-blue">📋</span>',invoice:'<span class="badge bg-gray">🧾</span>',loose_parts:'<span class="badge bg-yellow">🔩</span>'}[r.formType]||"—";
    const sb={Submitted:'<span class="badge bg-blue">Submitted</span>',Signed:'<span class="badge bg-green">✅ Signed</span>',Pending:'<span class="badge bg-yellow">⏳ Pending</span>'}[r.status]||`<span class="badge bg-gray">${r.status||"—"}</span>`;
    return`<tr class="${dm?"dmg":""}" onclick="openD('${r.id}')">
      <td style="white-space:nowrap;font-weight:600">${r.date||"—"}</td>
      <td style="font-weight:700;color:#0078D4">${r.invoiceNo||"—"}</td>
      <td>${tb2}</td>
      <td><div class="drv-name">${r.driverName||"—"}</div><div class="drv-grp">${r.driverGroupName||""}</div></td>
      <td>${r.dealer||"—"}</td>
      <td style="font-weight:700;color:#00875A">$${(parseFloat(r.codAmount)||0).toFixed(2)}</td>
      <td>${iss?`<span style="font-size:11px;color:#DE350B;font-weight:700">${iss}</span>`:'<span style="color:#94a3b8">—</span>'}</td>
      <td>${sb}</td>
    </tr>`;
  }).join("");
  renderPag();
}

function renderPag(){
  const tot=FILT.length,pgs=Math.ceil(tot/PP);
  const s=Math.min((PG-1)*PP+1,tot),e=Math.min(PG*PP,tot);
  document.getElementById("pinfo").textContent=tot?`${s}–${e} of ${tot}`:"";
  const pb=document.getElementById("pbtns"); pb.innerHTML="";
  if(pgs<=1)return;
  const mk=(l,p,act,dis)=>{const b=document.createElement("button");b.className="pb2"+(act?" active":"");b.textContent=l;b.disabled=dis;if(!dis)b.onclick=()=>{PG=p;renderT();};pb.appendChild(b);};
  mk("‹",PG-1,false,PG===1);
  for(let p=Math.max(1,PG-2);p<=Math.min(pgs,PG+2);p++)mk(p,p,p===PG,false);
  mk("›",PG+1,false,PG===pgs);
}

function openD(id){
  const r=ALL.find(x=>x.id===id); if(!r)return;
  document.getElementById("ptitle").textContent="Invoice #"+(r.invoiceNo||"—");
  document.getElementById("psub").textContent=(r.formType||"")+" • "+(r.date||"");
  const parts=(r.parts||[]).filter(p=>p.part);
  document.getElementById("pbody").innerHTML=`
    <div class="dcard">
      <div style="font-size:10px;font-weight:700;color:#1d4ed8;margin-bottom:5px">👤 DRIVER</div>
      <div style="font-size:14px;font-weight:900;color:#1e3a8a">${r.driverName||"Unknown"}</div>
      <div style="font-size:11px;color:#2563eb;margin-top:1px">${r.driverEmail||""}</div>
      <span style="background:#00263E;color:white;font-size:9px;font-weight:600;padding:2px 7px;border-radius:3px;margin-top:5px;display:inline-block">📍 ${r.driverGroupName||"No Group"}</span>
      ${r.vehicleName?`<span style="background:#00263E;color:white;font-size:9px;font-weight:600;padding:2px 7px;border-radius:3px;margin:5px 0 0 5px;display:inline-block">🚛 ${r.vehicleName}</span>`:""}
    </div>
    <div class="psec"><h4>📋 Delivery</h4>
      ${dr("Date",r.date)}${dr("Invoice #",r.invoiceNo)}${dr("Dealer",r.dealer)}
      ${dr("Contact",r.dealerContact)}${dr("Phone",r.dealerPhone)}
      ${dr("COD","$"+(parseFloat(r.codAmount)||0).toFixed(2))}
      ${dr("Payment",r.paymentType)}${dr("Booklets",r.booklets)}${dr("Status",r.status)}
      ${dr("Damaged?",r.damaged?"⚠️ YES":"No")}${dr("Short?",r.shortShipped?"📦 YES":"No")}
      ${r.damagedParts&&r.damagedParts.length?dr("Damaged Parts",r.damagedParts.join(", ")):""}
    </div>
    ${r.comments?`<div class="psec"><h4>💬 Comments</h4><div style="background:#f8fafc;border-radius:6px;padding:8px;font-size:12px">${r.comments}</div></div>`:""}
    ${parts.length?`<div class="psec"><h4>🔧 Parts (${parts.length})</h4>
      <table style="width:100%;border-collapse:collapse;font-size:11px">
        <tr style="background:#f1f5f9"><th style="padding:4px 6px;text-align:left">Part</th><th>Model</th><th>Dmg</th><th>Short</th></tr>
        ${parts.map(p=>`<tr style="border-bottom:1px solid #f8fafc;${(p.damaged||p.shortShipped)?"background:#fff7ed":""}"><td style="padding:3px 6px">${p.part}</td><td>${p.model||"—"}</td><td>${p.damaged?"⚠️":"—"}</td><td>${p.shortShipped?"📦":"—"}</td></tr>`).join("")}
      </table></div>`:""}
    <div class="psec"><h4>🔗 System</h4>
      ${dr("MyGeotab ID",`<span style='font-family:monospace;font-size:10px'>${r.id||"—"}</span>`,true)}
      ${dr("Saved At",r.savedAt?new Date(r.savedAt).toLocaleString("en-US"):"")}
    </div>`;
  document.getElementById("ov").style.display="block";
  document.getElementById("panel").style.display="block";
}
function dr(l,v,raw=false){return`<div class="pr"><span class="l">${l}</span><span class="v">${raw?v:(v||"—")}</span></div>`;}
function closeP(){document.getElementById("ov").style.display="none";document.getElementById("panel").style.display="none";}

function exportCSV(){
  if(!FILT.length){alert("No data!");return;}
  const h=["Date","Invoice #","Type","Driver","Driver Email","Group","Vehicle","Dealer","COD","Payment","Status","Damaged?","Short?","Damaged Parts","Comments","Saved At"];
  const rows=FILT.map(r=>[r.date,r.invoiceNo,r.formType,r.driverName,r.driverEmail,r.driverGroupName,r.vehicleName,r.dealer,r.codAmount,r.paymentType,r.status,r.damaged?"YES":"No",r.shortShipped?"YES":"No",(r.damagedParts||[]).join("; "),r.comments,r.savedAt].map(v=>`"${(v||"").toString().replace(/"/g,'""')}"`));
  const csv=[h.join(","),...rows.map(r=>r.join(","))].join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="venture_"+new Date().toISOString().split("T")[0]+".csv";a.click();
}

function showLoad(){document.getElementById("tbody").innerHTML=`<tr><td colspan="8"><div class="empty"><div class="sp"></div><div>Loading from MyGeotab...</div></div></td></tr>`;}
function showErr(m){
  document.getElementById("errbox").style.display="block";
  document.getElementById("errbox").textContent="⚠️ "+m;
  document.getElementById("tbody").innerHTML=`<tr><td colspan="8"><div class="empty"><div style="font-size:26px;margin-bottom:8px">⚠️</div><div style="font-weight:700">Error loading data</div></div></td></tr>`;
}
function hideErr(){document.getElementById("errbox").style.display="none";}

window.onload=function(){
  const td=new Date(),fm=new Date(); fm.setDate(1);
  document.getElementById("f-from").value=fm.toISOString().split("T")[0];
  document.getElementById("f-to").value=td.toISOString().split("T")[0];
  document.getElementById("dbadge").textContent="📅 "+td.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
  document.getElementById("f-inv").addEventListener("keydown",e=>{if(e.key==="Enter")applyLocal();});

  // Dev mode: if opened outside MyGeotab (no geotab global), show empty state
  if(typeof geotab === "undefined"){
    setGeo("ok","Dev Mode");
    ALL=[];
    applyLocal();
  }
  // ✅ If inside MyGeotab: geotab.addin.ventureReports lifecycle fires automatically
  //    MyGeotab calls initialize() → focus() → loadData() — no manual init needed
};
</script>
