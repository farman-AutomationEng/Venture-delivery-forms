<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dynasty Delivery Reports</title>
<link rel="stylesheet" href="styles.css">
<style>
/* ── View button ── */
.btn-view{padding:4px 10px;background:#0078D4;color:white;border:none;border-radius:4px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-view:hover{background:#006BBD}
.drv-name{font-weight:600;font-size:12px}
.drv-grp{font-size:10px;color:#94a3b8;margin-top:1px}

/* ── Inline Detail View ── */
#detail-view{display:none;padding:0 0 40px}

.det-back{
  display:flex;align-items:center;gap:8px;
  padding:12px 18px;
  background:#f8fafc;
  border-bottom:2px solid #e2e8f0;
  margin-bottom:0;
}
.btn-back{
  padding:7px 14px;background:white;color:#374151;
  border:1px solid #D1D5DB;border-radius:4px;
  font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;gap:6px;
}
.btn-back:hover{background:#f1f5f9;border-color:#9CA3AF}
.det-title{font-size:14px;font-weight:700;color:#00263E}
.det-sub{font-size:11px;color:#64748b;margin-left:4px}

.det-body{padding:18px}

/* Detail card sections */
.det-sec{margin-bottom:20px}
.det-sec-hdr{
  font-size:11px;font-weight:700;color:#00263E;
  text-transform:uppercase;letter-spacing:.7px;
  padding-bottom:8px;border-bottom:2px solid #E5E7EB;
  margin-bottom:12px;display:flex;align-items:center;gap:6px;
}
.det-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px 16px}
@media(max-width:600px){.det-grid{grid-template-columns:1fr 1fr}}
.det-field strong{display:block;font-size:9px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.det-field span{font-size:12px;color:#1A2432;font-weight:500}

/* Driver card in detail */
.drv-card{
  background:linear-gradient(135deg,#00263E,#003554);
  border-radius:8px;padding:14px 16px;margin-bottom:20px;
  display:flex;align-items:center;gap:14px;
}
.drv-av{width:40px;height:40px;border-radius:50%;background:#0078D4;display:flex;align-items:center;justify-content:center;color:white;font-size:14px;font-weight:800;flex-shrink:0}
.drv-info-name{color:white;font-size:14px;font-weight:800}
.drv-info-email{color:#7BBFDB;font-size:11px;margin-top:2px}
.drv-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.drv-tag{background:rgba(255,255,255,.12);color:#D1FAE5;font-size:9px;font-weight:600;padding:2px 8px;border-radius:3px}

/* Parts mini table */
.mini-tbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
.mini-tbl thead tr{background:#F1F5F9}
.mini-tbl th{padding:5px 8px;text-align:left;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.4px}
.mini-tbl td{padding:5px 8px;border-top:1px solid #F3F4F6}
.mini-tbl tr.dmg-row td{background:#FFF7ED}

/* Signature boxes */
.sig-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
.sig-box{border:1px solid #E5E7EB;border-radius:6px;overflow:hidden;background:#FAFAFA}
.sig-box-lbl{font-size:9px;font-weight:700;color:#6B7280;text-transform:uppercase;padding:6px 10px;background:#F3F4F6;border-bottom:1px solid #E5E7EB;letter-spacing:.6px}
.sig-box img{width:100%;height:70px;object-fit:contain;display:block;background:white;padding:4px}
.sig-none{height:70px;display:flex;align-items:center;justify-content:center;color:#9CA3AF;font-size:11px;font-style:italic}
.sig-signed{height:70px;display:flex;align-items:center;justify-content:center;color:#00875A;font-size:11px;font-weight:700}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>Dynasty Delivery Reports</h1>
    <p id="geo-txt"><span class="geo-dot loading"></span>Connecting...</p>
  </div>
  <span style="background:rgba(255,255,255,.15);color:white;font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px" id="dbadge"></span>
</div>

<div class="kpis">
  <div class="kpi">    <div class="kv" id="k1">—</div><div class="kl">Total Deliveries</div></div>
  <div class="kpi g">  <div class="kv" id="k2">—</div><div class="kl">Total COD</div></div>
  <div class="kpi r">  <div class="kv" id="k3">—</div><div class="kl">Damages</div></div>
  <div class="kpi y">  <div class="kv" id="k4">—</div><div class="kl">Drivers</div></div>
</div>

<div class="err-box" id="errbox"></div>

<!-- ══════════════════════════════════
     LIST VIEW
     ══════════════════════════════════ -->
<div id="list-view">
  <div class="filters">
    <div class="ff"><label>From</label><input type="date" id="f-from"></div>
    <div class="ff"><label>To</label><input type="date" id="f-to"></div>
    <div class="ff"><label>Group</label>
      <select id="f-grp" onchange="onGrpChange()">
        <option value="all">All Groups</option>
      </select>
    </div>
    <div class="ff"><label>Driver</label>
      <select id="f-drv"><option value="all">All Drivers</option></select>
    </div>
    <div class="ff"><label>Type</label>
      <select id="f-type">
        <option value="all">All Types</option>
        <option value="delivery_sheet">Delivery</option>
        <option value="invoice">Invoice</option>
        <option value="loose_parts">Loose Parts</option>
      </select>
    </div>
    <div class="ff"><label>Status</label>
      <select id="f-sta">
        <option value="all">All Status</option>
        <option value="Submitted">Submitted</option>
        <option value="Signed">Signed</option>
        <option value="Test">Test</option>
      </select>
    </div>
    <div class="ff"><label>Invoice #</label><input id="f-inv" style="width:85px"></div>
    <div class="btn-row">
      <button class="btn bp" onclick="loadData()">🔍 Search</button>
      <button class="btn bg2" onclick="resetF()">↺</button>
      <button class="btn bn" onclick="exportCSV()">⬇ CSV</button>
    </div>
  </div>

  <div class="tbl-wrap">
    <div class="tbl-head">
      <h2>Delivery Records <span id="rcnt" style="font-weight:400;color:#64748b"></span></h2>
      <button class="btn bg2" style="font-size:11px" onclick="loadData()">↺ Refresh</button>
    </div>
    <div class="tbl-scroll">
      <table>
        <thead><tr>
          <th onclick="srt('date')">Date ↕</th>
          <th onclick="srt('invoiceNo')">Invoice # ↕</th>
          <th onclick="srt('formType')">Type ↕</th>
          <th onclick="srt('driverName')">Driver ↕</th>
          <th onclick="srt('dealer')">Dealer ↕</th>
          <th onclick="srt('codAmount')">COD ↕</th>
          <th>Issues</th>
          <th onclick="srt('status')">Status ↕</th>
          <th>Action</th>
        </tr></thead>
        <tbody id="tbody">
          <tr><td colspan="9"><div class="empty"><div class="sp"></div><div>Loading...</div></div></td></tr>
        </tbody>
      </table>
    </div>
    <div class="pag">
      <span id="pinfo"></span>
      <div class="pbtns" id="pbtns"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════
     DETAIL VIEW (inline, no panel)
     ══════════════════════════════════ -->
<div id="detail-view">

  <!-- Back bar -->
  <div class="det-back">
    <button class="btn-back" onclick="showList()">← Back to List</button>
    <span class="det-title" id="det-title">—</span>
    <span class="det-sub" id="det-sub"></span>
  </div>

  <div class="det-body" id="det-body"></div>

</div>

<script>
// ============================================================
// DYNASTY DELIVERY REPORTS — ReportsPage.html
// Inline detail view — no fixed/absolute panel — iframe safe
// ============================================================

let ALL=[], FILT=[], DRIVERS=[], SK="date", SD=-1, PG=1;
let _api = null;
const PP=25;
const ADDIN_ID = "azXOKPvAnSnyIdUK2xZutWA";

// ── Geotab Add-In Entry Point ─────────────────────────────
geotab.addin.ventureReports = function() {
  return {
    initialize: function(api, state, callback) {
      _api = api;
      setGeo("ok","dynasty_communications");
      api.call("Get",{typeName:"Group"},function(gs){
        const sel=document.getElementById("f-grp");
        const valid=(gs||[]).filter(g=>
          g.id&&
          !["GroupCompanyId","GroupEverythingId","GroupNothingId"].includes(g.id)&&
          !g.id.startsWith("Group")
        );
        valid.sort((a,b)=>(a.name||"").localeCompare(b.name||""))
          .forEach(g=>{ sel.innerHTML+=`<option value="${g.id}">${g.name||g.id}</option>`; });
      },function(){});
      api.call("Get",{typeName:"User",search:{isActive:true}},function(us){
        DRIVERS=(us||[]).filter(u=>!u.isSystemUser);
        popDrv("all");
      },function(){});
      callback();
    },
    focus: function(api,state){ _api=api; loadData(); },
    blur:  function(api,state){}
  };
};

if(typeof geotab==="undefined"){ window._devMode=true; }

function setGeo(s,t){
  const c={ok:"#22c55e",loading:"#f59e0b",err:"#94a3b8"};
  document.getElementById("geo-txt").innerHTML=
    `<span style="width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px;background:${c[s]||c.err}"></span>${t}`;
}

function onGrpChange(){ popDrv(document.getElementById("f-grp").value); }
function popDrv(gid){
  const sel=document.getElementById("f-drv");
  sel.innerHTML='<option value="all">All Drivers</option>';
  const drv=gid==="all"?DRIVERS:DRIVERS.filter(u=>(u.companyGroups||[]).some(g=>g.id===gid));
  drv.sort((a,b)=>((a.firstName||"")+" "+(a.lastName||"")).localeCompare((b.firstName||"")+" "+(b.lastName||"")))
    .forEach(u=>{
      const nm=((u.firstName||"")+" "+(u.lastName||"")).trim()||u.name||u.id;
      sel.innerHTML+=`<option value="${u.id}">${nm}</option>`;
    });
}

// ── View switching ────────────────────────────────────────
function showList(){
  document.getElementById("list-view").style.display="block";
  document.getElementById("detail-view").style.display="none";
  window.scrollTo(0,0);
}
function showDetail(){
  document.getElementById("list-view").style.display="none";
  document.getElementById("detail-view").style.display="block";
  window.scrollTo(0,0);
}

// ── Load Data ─────────────────────────────────────────────
function loadData(){
  showLoad(); hideErr();
  if(!_api){
    if(window._devMode){ setGeo("ok","Dev Mode"); ALL=[]; applyLocal(); }
    else setGeo("loading","Waiting for MyGeotab...");
    return;
  }
  const f=getF();
  _api.call("Get",
    {typeName:"AddInData",search:{addInId:ADDIN_ID}},
    function(rows){
      let parsed=(rows||[]).map(r=>{
        try{
          const d=typeof r.details==="string"?JSON.parse(r.details):r.details;
          if(d) d.id=r.id;
          return d;
        }catch(e){return null;}
      }).filter(Boolean);
      if(f.fromDate) parsed=parsed.filter(r=>r.date&&r.date>=f.fromDate);
      if(f.toDate)   parsed=parsed.filter(r=>r.date&&r.date<=f.toDate);
      if(f.driverId&&f.driverId!=="all") parsed=parsed.filter(r=>r.driverUserId===f.driverId);
      if(f.formType&&f.formType!=="all") parsed=parsed.filter(r=>r.formType===f.formType);
      if(f.status&&f.status!=="all")     parsed=parsed.filter(r=>r.status===f.status);
      ALL=parsed;
      applyLocal();
    },
    function(err){ showErr("Error: "+(err.message||err)); }
  );
}

function getF(){
  return{
    fromDate:document.getElementById("f-from")?.value||"",
    toDate:  document.getElementById("f-to")?.value||"",
    driverId:document.getElementById("f-drv")?.value||"all",
    formType:document.getElementById("f-type")?.value||"all",
    status:  document.getElementById("f-sta")?.value||"all",
  };
}

function applyLocal(){
  const q=(document.getElementById("f-inv")?.value||"").trim().toLowerCase();
  FILT=ALL.filter(r=>!q||(r.invoiceNo||"").toLowerCase().includes(q));
  sortR(); updateKPI(); PG=1; renderT();
}

function resetF(){
  const td=new Date().toISOString().split("T")[0];
  const fm=new Date(); fm.setDate(1);
  document.getElementById("f-from").value=fm.toISOString().split("T")[0];
  document.getElementById("f-to").value=td;
  ["f-grp","f-drv","f-type","f-sta"].forEach(id=>document.getElementById(id).value="all");
  document.getElementById("f-inv").value="";
  popDrv("all");
  loadData();
}

function srt(k){if(SK===k)SD*=-1;else{SK=k;SD=-1;}sortR();PG=1;renderT();}
function sortR(){
  FILT.sort((a,b)=>{
    const av=a[SK]||"",bv=b[SK]||"";
    return typeof av==="number"?(av-bv)*SD:av.toString().localeCompare(bv.toString())*SD;
  });
}

function updateKPI(){
  const cod=FILT.reduce((s,r)=>s+(parseFloat(r.codAmount)||0),0);
  const dmg=FILT.filter(r=>r.damaged).length;
  const drvs=new Set(FILT.map(r=>r.driverUserId).filter(Boolean)).size;
  document.getElementById("k1").textContent=FILT.length;
  document.getElementById("k2").textContent="$"+cod.toLocaleString("en-US",{maximumFractionDigits:0});
  document.getElementById("k3").textContent=dmg;
  document.getElementById("k4").textContent=drvs||"—";
}

// ── Type label (text, no emoji) ───────────────────────────
function typeLabel(ft){
  return {delivery_sheet:"Delivery", invoice:"Invoice", loose_parts:"Loose Parts"}[ft] || (ft||"—");
}
function typeBadge(ft){
  const map={
    delivery_sheet:'<span class="badge bg-blue">Delivery</span>',
    invoice:       '<span class="badge bg-gray">Invoice</span>',
    loose_parts:   '<span class="badge bg-yellow">Loose Parts</span>'
  };
  return map[ft]||`<span class="badge bg-gray">${ft||"—"}</span>`;
}
function statusBadge(s){
  const map={
    Submitted:'<span class="badge bg-blue">Submitted</span>',
    Signed:   '<span class="badge bg-green">Signed</span>',
    Pending:  '<span class="badge bg-yellow">Pending</span>',
    Test:     '<span class="badge bg-gray">Test</span>'
  };
  return map[s]||`<span class="badge bg-gray">${s||"—"}</span>`;
}

// ── Render Table ──────────────────────────────────────────
function renderT(){
  const tb=document.getElementById("tbody");
  document.getElementById("rcnt").textContent="("+FILT.length+")";
  if(!FILT.length){
    tb.innerHTML=`<tr><td colspan="9"><div class="empty"><div style="font-size:26px;margin-bottom:8px">📭</div><div style="font-weight:700">No records found</div></div></td></tr>`;
    renderPag(); return;
  }
  const sl=FILT.slice((PG-1)*PP,PG*PP);
  tb.innerHTML=sl.map(r=>{
    const dm=r.damaged||r.shortShipped;
    const iss=[r.damaged&&"Dmg",r.shortShipped&&"Short"].filter(Boolean).join(", ");
    return`<tr style="${dm?"background:#FFF7ED":""}">
      <td style="white-space:nowrap;font-weight:600">${r.date||"—"}</td>
      <td style="font-weight:700;color:#0078D4">${r.invoiceNo||"—"}</td>
      <td>${typeBadge(r.formType)}</td>
      <td>
        <div class="drv-name">${r.driverName||"—"}</div>
        <div class="drv-grp">${r.driverGroupName||""}</div>
      </td>
      <td>${r.dealer||"—"}</td>
      <td style="font-weight:700;color:#00875A">$${(parseFloat(r.codAmount)||0).toFixed(2)}</td>
      <td>${iss?`<span style="font-size:11px;color:#DE350B;font-weight:700">${iss}</span>`:'<span style="color:#94a3b8">—</span>'}</td>
      <td>${statusBadge(r.status)}</td>
      <td><button class="btn-view" onclick="openD('${r.id}')">View</button></td>
    </tr>`;
  }).join("");
  renderPag();
}

function renderPag(){
  const tot=FILT.length,pgs=Math.ceil(tot/PP);
  const s=Math.min((PG-1)*PP+1,tot),e=Math.min(PG*PP,tot);
  document.getElementById("pinfo").textContent=tot?`${s}–${e} of ${tot}`:"";
  const pb=document.getElementById("pbtns"); pb.innerHTML="";
  if(pgs<=1)return;
  const mk=(l,p,act,dis)=>{
    const b=document.createElement("button");
    b.className="pb2"+(act?" active":"");
    b.textContent=l; b.disabled=dis;
    if(!dis) b.onclick=()=>{PG=p;renderT();};
    pb.appendChild(b);
  };
  mk("‹",PG-1,false,PG===1);
  for(let p=Math.max(1,PG-2);p<=Math.min(pgs,PG+2);p++) mk(p,p,p===PG,false);
  mk("›",PG+1,false,PG===pgs);
}

// ── Open Detail (inline — no panel/overlay) ───────────────
function openD(id){
  const r=ALL.find(x=>x.id===id); if(!r) return;

  document.getElementById("det-title").textContent="Invoice #"+(r.invoiceNo||"—")+" — "+typeLabel(r.formType);
  document.getElementById("det-sub").textContent=r.date||"";

  const initials=(r.driverName||"?").split(" ").map(w=>w[0]||"").join("").toUpperCase().slice(0,2)||"?";
  const parts=(r.parts||[]).filter(p=>p.part);

  let html=`
  <!-- Driver card -->
  <div class="drv-card">
    <div class="drv-av">${initials}</div>
    <div>
      <div class="drv-info-name">${r.driverName||"Unknown Driver"}</div>
      <div class="drv-info-email">${r.driverEmail||""}</div>
      <div class="drv-tags">
        <span class="drv-tag">📍 ${r.driverGroupName||"No Group"}</span>
        ${r.vehicleName?`<span class="drv-tag">🚛 ${r.vehicleName}</span>`:""}
        <span class="drv-tag">${statusBadge(r.status)}</span>
      </div>
    </div>
  </div>`;

  // ── Delivery ──
  if(r.formType==="delivery_sheet"){
    html+=`
    <div class="det-sec">
      <div class="det-sec-hdr">Delivery Information</div>
      <div class="det-grid">
        ${df("Date",           r.date)}
        ${df("Invoice #",      r.invoiceNo)}
        ${df("Dealer",         r.dealer)}
        ${df("Address",        r.dealerAddress)}
        ${df("Contact",        r.dealerContact)}
        ${df("Phone",          r.dealerPhone)}
        ${df("Dealer Email",   r.dealerEmail)}
        ${df("COD Amount",     r.codAmount?"$"+parseFloat(r.codAmount).toFixed(2):"$0.00")}
        ${df("Payment Type",   r.paymentType)}
        ${df("Booklets",       r.booklets)}
        ${df("Accepted",       r.accepted?"YES":"NO")}
        ${df("Damaged",        r.damaged?"YES":"No")}
        ${df("Short Shipped",  r.shortShipped?"YES":"No")}
        ${r.damagedParts&&r.damagedParts.length?df("Damaged Parts",r.damagedParts.join(", ")):""}
      </div>
    </div>`;

    if(r.comments){
      html+=`<div class="det-sec">
        <div class="det-sec-hdr">Comments</div>
        <div style="background:#f8fafc;border-radius:6px;padding:10px 12px;font-size:12px;color:#374151;line-height:1.6">${r.comments}</div>
      </div>`;
    }

    if(parts.length){
      html+=`<div class="det-sec">
        <div class="det-sec-hdr">Parts Condition (${parts.length})</div>
        <table class="mini-tbl">
          <thead><tr><th>Part</th><th>Model</th><th>Damaged</th><th>Short Ship</th><th>Notes</th></tr></thead>
          <tbody>
          ${parts.map(p=>`<tr class="${(p.damaged||p.shortShipped)?"dmg-row":""}">
            <td style="font-weight:600">${p.part}</td>
            <td>${p.model||"—"}</td>
            <td>${p.damaged?'<span style="color:#DE350B;font-weight:700">YES</span>':"No"}</td>
            <td>${p.shortShipped?'<span style="color:#F59E0B;font-weight:700">YES</span>':"No"}</td>
            <td style="color:#64748b">${p.notes||"—"}</td>
          </tr>`).join("")}
          </tbody>
        </table>
      </div>`;
    }

    html+=`<div class="det-sec">
      <div class="det-sec-hdr">Signatures</div>
      <div class="sig-row">
        ${sigBox("Driver",    r.driverSignature,    r.driverSigned)}
        ${sigBox("Consignee", r.consigneeSignature, r.consigneeSigned)}
      </div>
    </div>`;
  }

  // ── Invoice ──
  if(r.formType==="invoice"){
    html+=`
    <div class="det-sec">
      <div class="det-sec-hdr">Invoice Information</div>
      <div class="det-grid">
        ${df("Date",            r.date)}
        ${df("Invoice #",       r.invoiceNo)}
        ${df("Acct No.",        r.acctNo)}
        ${df("Terms",           r.terms)}
        ${df("Sales Order",     r.salesOrder)}
        ${df("Shipping Method", r.shippingMethod)}
        ${df("PO #",            r.po)}
      </div>
    </div>
    <div class="det-sec">
      <div class="det-sec-hdr">Addresses</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
        <div>
          <div style="font-size:9px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px">Bill To</div>
          <div style="font-size:12px;white-space:pre-line;color:#1A2432">${r.billTo||"—"}</div>
        </div>
        <div>
          <div style="font-size:9px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.6px;margin-bottom:4px">Ship To</div>
          <div style="font-size:12px;white-space:pre-line;color:#1A2432">${r.shipTo||"—"}</div>
        </div>
      </div>
    </div>`;
  }

  // ── Loose Parts ──
  if(r.formType==="loose_parts"){
    html+=`
    <div class="det-sec">
      <div class="det-sec-hdr">Check-In Information</div>
      <div class="det-grid">
        ${df("Date",         r.date)}
        ${df("Invoice #",    r.invoiceNo)}
        ${df("Sales Order",  r.salesOrder)}
        ${df("PL#",          r.pl)}
        ${df("TRK#",         r.trk)}
        ${df("Dealer",       r.dealer)}
        ${df("Driver Signed",   r.driverSigned   ?"YES":"NO")}
        ${df("Receiver Signed", r.receiverSigned ?"YES":"NO")}
      </div>
    </div>`;

    if(parts.length){
      html+=`<div class="det-sec">
        <div class="det-sec-hdr">Parts List (${parts.length})</div>
        <table class="mini-tbl">
          <thead><tr><th>Location</th><th>Qty</th><th>Part</th><th>Pulled</th><th>Loaded</th><th>N/C</th><th>COD</th></tr></thead>
          <tbody>
          ${parts.map(p=>`<tr>
            <td>${p.location||"—"}</td><td>${p.qty||"—"}</td>
            <td style="font-weight:600">${p.part}</td>
            <td>${p.pulled?'<span style="color:#00875A;font-weight:700">Yes</span>':"—"}</td>
            <td>${p.loaded?'<span style="color:#00875A;font-weight:700">Yes</span>':"—"}</td>
            <td>${p.nc   ?'<span style="color:#0078D4;font-weight:700">Yes</span>':"—"}</td>
            <td>${p.cod  ?'<span style="color:#0078D4;font-weight:700">Yes</span>':"—"}</td>
          </tr>`).join("")}
          </tbody>
        </table>
      </div>`;
    }

    if(r.comments){
      html+=`<div class="det-sec">
        <div class="det-sec-hdr">Comments</div>
        <div style="background:#f8fafc;border-radius:6px;padding:10px 12px;font-size:12px;color:#374151">${r.comments}</div>
      </div>`;
    }
  }

  // System info
  html+=`<div class="det-sec">
    <div class="det-sec-hdr">System</div>
    <div class="det-grid">
      ${df("MyGeotab ID", r.id||"—")}
      ${df("Saved At", r.savedAt?new Date(r.savedAt).toLocaleString("en-US"):"")}
    </div>
  </div>`;

  document.getElementById("det-body").innerHTML=html;
  showDetail();
}

// ── Helpers ───────────────────────────────────────────────
function df(label, value){
  const v=(value===undefined||value===null||value==="")?'<span style="color:#9CA3AF">—</span>':
    `<span>${String(value)}</span>`;
  return`<div class="det-field"><strong>${label}</strong>${v}</div>`;
}
function sigBox(label, base64, signed){
  const lbl=`<div class="sig-box-lbl">${label}</div>`;
  let inner="";
  if(base64&&base64.length>50){
    inner=`<img src="${base64}" alt="${label} signature">`;
  }else if(signed){
    inner=`<div class="sig-signed">✓ Signed</div>`;
  }else{
    inner=`<div class="sig-none">Not signed</div>`;
  }
  return`<div class="sig-box">${lbl}${inner}</div>`;
}

// ── CSV Export ────────────────────────────────────────────
function exportCSV(){
  if(!FILT.length){alert("No data!");return;}
  const h=["Date","Invoice #","Type","Driver","Driver Email","Group","Vehicle","Dealer","COD","Payment","Status","Damaged?","Short?","Damaged Parts","Comments"];
  const rows=FILT.map(r=>[
    r.date, r.invoiceNo, typeLabel(r.formType), r.driverName, r.driverEmail,
    r.driverGroupName, r.vehicleName, r.dealer, r.codAmount, r.paymentType,
    r.status, r.damaged?"YES":"No", r.shortShipped?"YES":"No",
    (r.damagedParts||[]).join("; "), r.comments
  ].map(v=>`"${(v||"").toString().replace(/"/g,'""')}"`));
  const csv=[h.join(","),...rows.map(r=>r.join(","))].join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download="venture_"+new Date().toISOString().split("T")[0]+".csv";
  a.click();
}

function showLoad(){
  document.getElementById("tbody").innerHTML=
    `<tr><td colspan="9"><div class="empty"><div class="sp"></div><div>Loading from MyGeotab...</div></div></td></tr>`;
}
function showErr(m){
  document.getElementById("errbox").style.display="block";
  document.getElementById("errbox").textContent="⚠️ "+m;
  document.getElementById("tbody").innerHTML=
    `<tr><td colspan="9"><div class="empty"><div style="font-size:26px;margin-bottom:8px">⚠️</div><div style="font-weight:700">Error loading data</div></div></td></tr>`;
}
function hideErr(){ document.getElementById("errbox").style.display="none"; }
